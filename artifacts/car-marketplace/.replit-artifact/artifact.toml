kind = "web"
previewPath = "/"
title = "Car Marketplace"
version = "1.0.0"
id = "artifacts/car-marketplace"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/", "/api" ]
localPort = 24519

[services.development]
run = "pnpm --filter @workspace/car-marketplace run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/car-marketplace", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/car-marketplace", "run", "start" ]

[services.env]
PORT = "24519"
